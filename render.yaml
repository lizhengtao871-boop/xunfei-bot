services:
  - type: web
    name: xunfei-association-bot
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: WX_CORP_ID
        sync: false
      - key: WX_AGENT_SECRET
        sync: false
      - key: WX_TOKEN
        sync: false
      - key: WX_ENCODING_AES_KEY
        sync: false
      - key: WX_AGENT_ID
        sync: false
      - key: DATABASE_URL
        value: sqlite:///data/association.db
